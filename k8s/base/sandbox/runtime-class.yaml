# RuntimeClass for AKS Pod Sandboxing with Kata Containers (§4.1.1)
# Pods using this class run inside Hyper-V microVMs on Azure Linux nodes.
# Defender eBPF cannot penetrate the microVM boundary — see §4.1.1 for
# compensating controls.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-mshv-vm-isolation
handler: kata-mshv-vm-isolation
overhead:
  podFixed:
    memory: "160Mi"
    cpu: "250m"
scheduling:
  nodeSelector:
    kubernetes.azure.com/os-sku: AzureLinux
    openclaw.io/pool: sandbox
  tolerations:
    - key: "openclaw.io/sandbox-only"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
