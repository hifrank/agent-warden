apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: agent-warden-system
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: agent-warden
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 256
      filter/health:
        traces:
          span:
            - 'name == "GET /health" or name == "GET /healthz" or name == "GET /health/readiness" or name == "GET /health/liveliness"'

    exporters:
      azuremonitor:
        connection_string: "${env:APPLICATIONINSIGHTS_CONNECTION_STRING}"
        maxbatchsize: 100
        maxbatchinterval: 10s
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, filter/health]
          exporters: [azuremonitor]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [azuremonitor]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [azuremonitor]
