apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-{{ .Values.tenantId }}
  namespace: tenant-{{ .Values.tenantId }}
  labels:
    {{- include "openclaw-tenant.labels" . | nindent 4 }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.keyVault.clientId }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
