# Gateway API HTTPRoute — routes webhook + WebSocket traffic to this tenant (§7)
# The ALB Controller reconciles these into Application Gateway for Containers config.
{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-{{ .Values.tenantId }}-webhooks
  namespace: tenant-{{ .Values.tenantId }}
  labels:
    {{- include "openclaw-tenant.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    # Webhook routes: /webhook/{channel}/{tenant-id}
    - matches:
        - path:
            type: PathPrefix
            value: /webhook/telegram/{{ .Values.tenantId }}
        - path:
            type: PathPrefix
            value: /webhook/slack/{{ .Values.tenantId }}
        - path:
            type: PathPrefix
            value: /webhook/discord/{{ .Values.tenantId }}
      backendRefs:
        - name: openclaw-{{ .Values.tenantId }}
          port: 18789
    # WebSocket route: /ws/{tenant-id}
    - matches:
        - path:
            type: PathPrefix
            value: /ws/{{ .Values.tenantId }}
      backendRefs:
        - name: openclaw-{{ .Values.tenantId }}
          port: 18789
{{- end }}
