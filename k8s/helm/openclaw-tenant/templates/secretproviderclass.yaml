# SecretProviderClass for Secrets Store CSI Driver (§6.2)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: openclaw-{{ .Values.tenantId }}
  namespace: tenant-{{ .Values.tenantId }}
  labels:
    {{- include "openclaw-tenant.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.keyVault.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantIdEntra | quote }}
    objects: |
      array:
        - |
          objectName: openai-api-key
          objectType: secret
        - |
          objectName: anthropic-api-key
          objectType: secret
        {{- if .Values.azureOpenAI.enabled }}
        - |
          objectName: azure-openai-api-key
          objectType: secret
        {{- end }}
        {{- if .Values.purviewDlpPlugin.enabled }}
        - |
          objectName: purview-dlp-client-id
          objectType: secret
        - |
          objectName: purview-dlp-client-secret
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: openclaw-{{ .Values.tenantId }}-secrets
      type: Opaque
      data:
        - objectName: openai-api-key
          key: OPENAI_API_KEY
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
        {{- if .Values.azureOpenAI.enabled }}
        - objectName: azure-openai-api-key
          key: AZURE_OPENAI_API_KEY
        {{- end }}
        {{- if .Values.purviewDlpPlugin.enabled }}
        - objectName: purview-dlp-client-id
          key: PURVIEW_DLP_CLIENT_ID
        - objectName: purview-dlp-client-secret
          key: PURVIEW_DLP_CLIENT_SECRET
        {{- end }}
