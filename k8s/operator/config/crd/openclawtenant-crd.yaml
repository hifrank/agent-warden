# OpenClawTenant Custom Resource Definition (§10, §23.4.3)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawtenants.openclaw.io
  labels:
    app.kubernetes.io/part-of: agent-warden
spec:
  group: openclaw.io
  names:
    kind: OpenClawTenant
    listKind: OpenClawTenantList
    plural: openclawtenants
    singular: openclawtenant
    shortNames:
      - oct
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["tenantId", "tier", "adminEmail"]
              properties:
                tenantId:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
                  minLength: 3
                  maxLength: 63
                tier:
                  type: string
                  enum: ["free", "pro", "enterprise"]
                adminEmail:
                  type: string
                  format: email
                region:
                  type: string
                  default: "eastus2"
                version:
                  type: string
                  default: "0.9.28"
                channels:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      enabled:
                        type: boolean
                suspended:
                  type: boolean
                  default: false
                keyVault:
                  type: object
                  properties:
                    name:
                      type: string
                    clientId:
                      type: string
                    tenantIdEntra:
                      type: string
                gitSync:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    repo:
                      type: string
            status:
              type: object
              properties:
                state:
                  type: string
                  enum:
                    - Requested
                    - Provisioning
                    - Active
                    - Degraded
                    - Suspended
                    - Archived
                    - Deleted
                healthScore:
                  type: number
                healthStatus:
                  type: string
                  enum: ["Healthy", "Degraded", "Unhealthy"]
                lastHealthCheck:
                  type: string
                  format: date-time
                podCount:
                  type: integer
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Tier
          type: string
          jsonPath: .spec.tier
        - name: State
          type: string
          jsonPath: .status.state
        - name: Health
          type: string
          jsonPath: .status.healthStatus
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
