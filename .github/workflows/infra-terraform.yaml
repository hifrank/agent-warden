name: 'Infrastructure — Terraform'

on:
  push:
    branches: [main]
    paths: ['infra/terraform/**']
  pull_request:
    branches: [main]
    paths: ['infra/terraform/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write    # For OIDC → Azure
  contents: read

env:
  TF_VERSION: '1.7.0'

jobs:
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="environments/${{ github.event.inputs.environment || 'dev' }}/backend.tfvars"

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ github.event.inputs.environment || 'dev' }}/terraform.tfvars" \
            -var="aks_admin_group_object_id=${{ secrets.AKS_ADMIN_GROUP_ID }}" \
            -out=tfplan \
            -input=false

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/terraform/tfplan

  apply:
    name: 'Terraform Apply'
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/terraform

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="environments/${{ github.event.inputs.environment || 'dev' }}/backend.tfvars"

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve -input=false tfplan
